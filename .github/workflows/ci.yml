name: SmartCityAI CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies (no torch/tensorflow)
        run: |
          cd backend
          pip install --upgrade pip
          pip uninstall tensorflow tensorflow-intel keras tf-keras -y 2>/dev/null || true
          pip install "protobuf>=4.25.0" --upgrade --quiet
          pip install --quiet \
            fastapi "uvicorn[standard]" \
            sqlalchemy alembic psycopg2-binary geoalchemy2 \
            redis faker numpy \
            scikit-learn pandas \
            mlflow \
            pydantic pydantic-settings python-dotenv \
            rich loguru \
            pytest pytest-asyncio httpx python-multipart

      - name: Run unit tests (skip NLP tests that need torch)
        env:
          DATABASE_URL: postgresql://x:x@localhost/x
          REDIS_URL: redis://localhost:6379/0
          USE_TF: "0"
        run: |
          cd backend
          python -m pytest tests/ \
            -v \
            --tb=short \
            --junitxml=test-results.xml \
            --ignore=tests/test_nlp.py \
            -p no:warnings

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: backend/test-results.xml

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and build
        run: |
          cd frontend
          npm install
          npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  docker-build:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          dockerfile: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/smartcity-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          dockerfile: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/smartcity-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

